[modes.plan]
network = false
readonly = true
approvedTools = []
allowOverrides = true

[modes.default]
network = false
readonly = false
approvedTools = ['cat', 'ls', 'grep', 'head', 'tail', 'less', 'Get-Content', 'dir', 'type', 'findstr', 'Get-ChildItem', 'echo']
allowOverrides = true

[modes.accepting_edits]
network = false
readonly = false
approvedTools = ['sed', 'grep', 'awk', 'perl', 'cat', 'echo', 'Add-Content', 'Set-Content']
allowOverrides = true

[commands]

[[rules]]
name = "Deny gha-creds"
toolName = "*"
argsPattern = ".*gha-creds-.*\\.json.*"
decision = "deny"
denyMessage = "Access to GitHub Actions credentials file is denied."
