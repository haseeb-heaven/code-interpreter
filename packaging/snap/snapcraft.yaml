name: openagent
version: '<VERSION>'
summary: Open-source terminal agent
description: |
  Describe a task in plain English. OpenAgent plans, uses tools, and delivers —
  with free, local, and BYOK cloud models.
grade: stable
confinement: classic
base: core22

parts:
  openagent:
    plugin: dump
    source: .
    override-build: |
      npm ci
      npm run bundle
      cp bundle/openagent.js $SNAPCRAFT_PART_INSTALL/openagent.js

apps:
  openagent:
    command: node $SNAP/openagent.js
    plugs: [network, home, dot-local-share]
