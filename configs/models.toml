# =============================================================================
# models.toml -- single-file model registry for Open Code Interpreter
# =============================================================================
#
# This file fully replaces the old configs/*.json + configs/free/catalog.json
# layout. Add your OWN models/providers by editing this file directly --
# no Python code changes required.
#
# --- [models.<name>] ---------------------------------------------------------
# model            (required) litellm-style model id, e.g. "gemini/gemini-2.5-flash"
# provider         (optional) explicit provider tag: openai/gemini/groq/anthropic/
#                  deepseek/openrouter/nvidia/z-ai/cerebras/browser-use/local/ollama/lmstudio/huggingface
# api_base         (optional) OpenAI-compatible base URL (openrouter/nvidia/z-ai/local/...)
# temperature      (optional, default 0.1)
# max_tokens       (optional, default 4096)
# tier             (optional) "paid" | "free" | "free_tier" | "local" -- informational
# notes            (optional) human-readable description
# timeout_seconds, rate_limits.{rpm,burst}, circuit_breaker.{threshold,cooldown_seconds}
#                  (optional) KeyManager pool tuning; see libs/key_manager.py
# browser_use_timeout / browser_use_poll_interval (optional) Browser Use provider only
#
# --- [[free_catalog]] ---------------------------------------------------------
# Ordered rotation list for --free / --gemini-style / /free. Each row references
# a [models.*] entry via "model_key".
# id         short display id (may differ from model_key, e.g. "ollama" -> "local-model")
# model_key  key of the [models.<name>] table to use
# provider   provider tag (for grouping / same-provider fallback ordering)
# env_key    required environment variable, or "" when no key is needed (local)
# tier       "free" | "free_tier" | "local"
# notes      human-readable description
#
# --- [[default_priority]] -------------------------------------------------------
# First entry whose `env` variable is set in the environment wins as the default
# model when no -m/--model is given. Falls back to `default_model` below that.
# =============================================================================

schema_version = 1
# No env key configured at all -> route to the local, no-key-required model
# (Ollama's OpenAI-compat endpoint) instead of a paid cloud model. Selecting
# "Free / open-source / local models" with zero API keys set must not crash
# by trying to auth against gpt-4o.
default_model = "local-model"

[[default_priority]]
env = "OPENAI_API_KEY"
model = "gpt-4o"

[[default_priority]]
env = "OPENROUTER_API_KEY"
model = "openrouter-free"

[[default_priority]]
env = "GEMINI_API_KEY"
model = "gemini-2.5-flash"

[[default_priority]]
env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-6"

[[default_priority]]
env = "GROQ_API_KEY"
model = "groq-gpt-oss-20b"

[[default_priority]]
env = "CEREBRAS_API_KEY"
model = "cerebras-gpt-oss-120b"

[[default_priority]]
env = "Z_AI_API_KEY"
model = "z-ai-glm-5"

[[default_priority]]
env = "NVIDIA_API_KEY"
model = "nvidia-nemotron"

[[default_priority]]
env = "DEEPSEEK_API_KEY"
model = "deepseek-chat"

[[default_priority]]
env = "HUGGINGFACE_API_KEY"
model = "hf-meta-llama-3"

[[default_priority]]
env = "BROWSER_USE_API_KEY"
model = "browser-use-bu-max"

# -----------------------------------------------------------------------------
# Models
# -----------------------------------------------------------------------------

